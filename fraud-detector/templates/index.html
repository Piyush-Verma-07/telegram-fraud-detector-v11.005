<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }
        textarea {
            width: 60%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: white;
            display: inline-block;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>🚨 Telegram Fraud Detector</h1>

    <form method="POST">
        <textarea name="message" placeholder="Paste suspicious message here..."></textarea><br><br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
    <div class="result">
        <h2>Risk Score: {{ result.score }}</h2>

        <h3>Reasons:</h3>
        <ul>
            {% for r in result.reasons %}
                <li>{{ r }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

</body>
</html>
