<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>

    Contact Us | Fraud Detector

  </title>

  <!-- Tailwind Output CSS -->

  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='output.css') }}">

</head>

<!-- ================= BODY ================= -->

<body
  class="
  min-h-screen

  bg-gradient-to-br
  from-[#0f172a]
  via-[#111827]
  to-black

  text-white
  antialiased
  ">

  <!-- ================= PAGE WRAPPER ================= -->

  <div
    class="
    max-w-3xl
    mx-auto

    px-6
    py-16
    ">

    <!-- ================= PAGE TITLE ================= -->

    <div class="mb-10">

      <h1
        class="
        text-4xl
        md:text-5xl
        font-extrabold
        tracking-tight
        mb-4
        ">

        Contact Us

      </h1>

      <p
        class="
        text-slate-400
        text-lg
        leading-relaxed
        ">

        For support, feedback, or inquiries related to Fraud Detector.

      </p>

    </div>

    <!-- ================= CONTACT CARD ================= -->

    <div
      class="
      bg-slate-800/70
      backdrop-blur-xl

      border
      border-slate-700

      rounded-3xl

      p-8
      md:p-10

      shadow-2xl
      ">

      <!-- ================= EMAIL LABEL ================= -->

      <p
        class="
        text-slate-300
        text-[17px]
        leading-relaxed
        ">

        Contact Email

      </p>

      <!-- ================= EMAIL ================= -->

      <p
        class="
        mt-4

        text-blue-400
        text-lg

        break-all
        ">

        frauddetectorhelp@gmail.com

      </p>

      <!-- ================= NOTE ================= -->

      <p
        class="
        mt-8

        text-slate-400
        text-[16px]
        leading-relaxed
        ">

        Please allow some time for responses to inquiries and support requests.

      </p>

    </div>

    <!-- ================= BACK BUTTON ================= -->

    <div class="mt-10">

      <a
        href="/"
        class="
        inline-flex
        items-center

        text-slate-400
        hover:text-white

        transition
        duration-200
        ">

        ← Back to Fraud Detector

      </a>

    </div>

  </div>

</body>

</html>
